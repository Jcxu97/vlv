name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax check (project scripts)
        run: |
          python -m py_compile \
            gui.py \
            llm_analyze.py \
            transcribe_local.py \
            analyze_transcript.py \
            download_whisper_models.py \
            extract_bilibili_text.py \
            bilibili_pipeline.py
