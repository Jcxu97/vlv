name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools_scm needs the full history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*

  build-portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            archive: zip
            name: vlv-windows
          - os: macos-latest
            archive: tar.gz
            name: vlv-macos
          - os: ubuntu-latest
            archive: tar.gz
            name: vlv-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime deps (CPU baseline)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
      - name: Stage portable bundle
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.name }}
          cp -r src run_gui.py README.md requirements.txt requirements.lock dist/${{ matrix.name }}/ || true
          if [ -f start.sh ]; then cp start.sh dist/${{ matrix.name }}/ ; fi
          if [ -f START.bat ]; then cp START.bat dist/${{ matrix.name }}/ ; fi
      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/${{ matrix.name }}/* -DestinationPath dist/${{ matrix.name }}.zip
      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -C dist -czf dist/${{ matrix.name }}.tar.gz ${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.*

  publish:
    needs: [build-sdist, build-portable]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
