name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools_scm needs the full history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel
      - uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*

  build-windows-portable:
    # Runs the 准备便携环境.ps1 prepare script so the zip contains python_embed +
    # site-packages + tkinter. Recipient double-clicks START.bat — no Python install needed.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare portable environment (embed python + deps, skip Whisper/Chromium)
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File ".\准备便携环境.ps1" -SkipWhisperModel -SkipPlaywright
      - name: Stage bundle (exclude dev/test files)
        shell: pwsh
        run: |
          $stage = "dist\vlv-windows"
          New-Item -ItemType Directory -Force $stage | Out-Null
          $include = @(
            "python_embed", "src", "run_gui.py",
            "README.md", "LICENSE", "SECURITY.md",
            "requirements.txt", "requirements.lock",
            "START.bat", "启动.bat",
            "install_chromium.bat", "DOWNLOAD_WHISPER.bat",
            "INSTALL_TKINTER.bat", "add_tkinter_to_embed.ps1",
            "准备便携环境.ps1", "local_api_keys.example.py",
            "ffmpeg"
          )
          foreach ($item in $include) {
            if (Test-Path $item) {
              Copy-Item -Recurse -Force $item $stage
            }
          }
      - name: Archive zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\vlv-windows\* -DestinationPath dist\vlv-windows.zip
      - uses: actions/upload-artifact@v7
        with:
          name: vlv-windows
          path: dist/vlv-windows.zip

  build-macos-portable:
    # Creates a relocatable venv under ./venv using the GitHub-runner's Python 3.11.
    # start.sh auto-detects ./venv/bin/python on first run.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Create venv and install deps
        shell: bash
        run: |
          python3.11 -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          # Use top-level requirements.txt; requirements.lock was generated on
          # Windows x86_64 and pins versions that conflict on macOS arm64
          # (e.g. pyee==12.1.1 vs playwright 1.49.0 → pyee==12.0.0).
          ./venv/bin/python -m pip install -r requirements.txt
      - name: Stage bundle
        shell: bash
        run: |
          mkdir -p dist/vlv-macos
          cp -r venv src run_gui.py README.md LICENSE SECURITY.md \
                requirements.txt requirements.lock start.sh \
                local_api_keys.example.py ffmpeg \
                dist/vlv-macos/ 2>/dev/null || true
          chmod +x dist/vlv-macos/start.sh
      - name: Archive tar.gz
        shell: bash
        run: |
          tar -C dist -czf dist/vlv-macos.tar.gz vlv-macos
      - uses: actions/upload-artifact@v7
        with:
          name: vlv-macos
          path: dist/vlv-macos.tar.gz

  build-linux-sourcebundle:
    # Lightweight source bundle for Linux: start.sh falls back to system python3.
    # We do not ship a venv here — Linux distros vary too much on glibc/ssl ABI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage bundle
        shell: bash
        run: |
          mkdir -p dist/vlv-linux
          cp -r src run_gui.py README.md LICENSE SECURITY.md \
                requirements.txt requirements.lock start.sh \
                local_api_keys.example.py ffmpeg \
                dist/vlv-linux/ 2>/dev/null || true
          chmod +x dist/vlv-linux/start.sh
      - name: Archive tar.gz
        shell: bash
        run: |
          tar -C dist -czf dist/vlv-linux.tar.gz vlv-linux
      - uses: actions/upload-artifact@v7
        with:
          name: vlv-linux
          path: dist/vlv-linux.tar.gz

  publish:
    needs: [build-sdist, build-windows-portable, build-macos-portable, build-linux-sourcebundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
