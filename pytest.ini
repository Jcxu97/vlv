[pytest]
testpaths = tests
pythonpath = src
addopts = -ra --strict-markers
markers =
    slow: tests that import heavy deps (yt_dlp extractors, torch, etc.) — skipped in quick CI
    e2e: real end-to-end tests hitting the network; excluded from default CI
    gpu: requires a CUDA GPU; skipped on CPU-only runners
filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:playwright.*
